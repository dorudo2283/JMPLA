<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>シャー芯ガチャ | 日本シャー芯協会</title>

<style>

/* ================= BASE ================= */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Yu Gothic","Meiryo",sans-serif;
}

body{
    background:#f5f5f5;
    color:#111;
}

/* 背景グリッド */
body::before{
    content:"";
    position:fixed;
    inset:0;
    background:
    linear-gradient(rgba(0,0,0,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,0,0,0.03) 1px, transparent 1px);
    background-size:40px 40px;
    z-index:-1;
}

/* ================= HEADER（ここが主役） ================= */

header{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    padding:18px 5%;
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:rgba(255,255,255,0.85);
    backdrop-filter:blur(10px);
    border-bottom:1px solid rgba(0,0,0,0.08);
    z-index:999;
}

.logo{
    font-size:24px;
    font-weight:bold;
    letter-spacing:4px;
}

.logo span{
    color:#d10000;
}

/* ================= BUTTON ================= */

.buttons{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

.btn{
    padding:12px 22px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    transition:.2s;
    font-size:14px;
    letter-spacing:2px;
}

.btn:hover{
    transform:translateY(-3px);
}

/* 役割別カラー */
.normal{
    background:#111;
    color:#fff;
}

.special{
    background:#d10000;
    color:#fff;
}

.oracle{
    background:#ffcc00;
    color:#111;
}

/* ================= MAIN ================= */

.main{
    padding:100px 20px 80px;
    display:flex;
    justify-content:center;
}

.gacha-box{
    width:min(1100px,100%);
    background:white;
    padding:50px;
    border-radius:20px;
    box-shadow:0 15px 40px rgba(0,0,0,0.08);
}

.title{
    font-size:50px;
    text-align:center;
    letter-spacing:5px;
}

.sub{
    text-align:center;
    margin-top:15px;
    color:#666;
    line-height:1.8;
}

/* ================= POWER ================= */

.power{
    text-align:center;
    font-size:38px;
    color:#d10000;
    margin-top:30px;
}

/* ================= SECTIONS ================= */

.section{
    display:none;
    margin-top:40px;
}

.active{
    display:block;
}

/* ================= RESULT ================= */

#result{
    min-height:400px;
    margin-top:40px;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    text-align:center;
}

/* ================= INVENTORY ================= */

.inventory-item{
    background:#fff;
    padding:18px;
    border-radius:12px;
    margin:10px 0;
    border-left:6px solid #999;
    box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

/* ================= FLASH ================= */

.flash{
    position:fixed;
    inset:0;
    pointer-events:none;
    animation:flash .5s ease;
    z-index:9999;
}

@keyframes flash{
    from{opacity:1;}
    to{opacity:0;}
}

</style>
</head>

<body>

<!-- ================= HEADER ================= -->
<header>

<div class="logo">シャー芯<span>ガチャ</span></div>

<div class="buttons">

    <button class="btn normal" onclick="showSection('main')">ガチャ</button>
    <button class="btn oracle" onclick="showSection('mini')">ミニゲーム</button>
    <button class="btn special" onclick="showSection('inventory')">所持</button>
    <button class="btn normal" onclick="showSection('code')">コード</button>

</div>

</header>

<!-- ================= MAIN ================= -->
<div class="main">

<div class="gacha-box">

<div class="title">シャー芯ガチャ</div>

<div class="sub">
選ばれしシャー芯を引き当てろ
</div>

<div class="power" id="powerText">芯ポイント : 0</div>

<!-- ================= MAIN SECTION ================= -->
<div id="section-main" class="section active">

<div class="buttons" style="justify-content:center; margin-top:20px;">

    <button class="btn oracle" onclick="dailyOracle()">お告げ +1</button>
    <button class="btn normal" onclick="drawGacha()">単発 -10</button>
    <button class="btn special" onclick="draw10()">10連 -100</button>

</div>

<div id="result">ここに結果</div>

</div>

<!-- ================= MINI ================= -->
<div id="section-mini" class="section">

<h2>ミニゲーム</h2>

<div class="buttons">
    <button class="btn special" onclick="startMiniGame()">開始</button>
    <button class="btn normal" onclick="stopMiniGame()">停止</button>
</div>

<div id="miniResult"></div>

</div>

<!-- ================= INVENTORY ================= -->
<div id="section-inventory" class="section">

<h2>所持シャー芯</h2>
<div id="inventoryList"></div>

</div>

<!-- ================= CODE ================= -->
<div id="section-code" class="section">

<h2>シリアルコード</h2>

<input id="codeInput" placeholder="コード入力" style="padding:10px;">

<button class="btn special" onclick="redeemCode()">使用</button>

</div>

</div>

</div>

<script>

/* ================= NAV ================= */

function showSection(name){

    const sections = ["main","mini","inventory","code"];

    sections.forEach(s=>{
        const el=document.getElementById("section-"+s);
        el.classList.remove("active");
    });

    document.getElementById("section-"+name).classList.add("active");
}

/* ================= POWER ================= */

function getPower(){
    return Number(localStorage.getItem("corePower"))||0;
}

function savePower(v){
    localStorage.setItem("corePower",v);
}

function updatePower(){
    document.getElementById("powerText")
    .innerText="芯ポイント : "+getPower();
}

/* ================= FLASH ================= */

function flash(c){
    const d=document.createElement("div");
    d.className="flash";
    d.style.background=c;
    document.body.appendChild(d);
    setTimeout(()=>d.remove(),500);
}

/* ================= SIMPLE GACHA ================= */

const items=[
{n:"HB",c:"#666"},
{n:"2B",c:"#0077ff"},
{n:"SSR芯",c:"#ffcc00"}
];

function drawGacha(){

    let p=getPower();
    if(p<10) return alert("不足");

    savePower(p-10);
    updatePower();

    const item=items[Math.floor(Math.random()*items.length)];

    document.getElementById("result").innerHTML=
    `<div style="color:${item.c};font-size:50px">${item.n}</div>`;
}

/* ================= INIT ================= */

updatePower();
showSection("main");

</script>

</body>
</html>
